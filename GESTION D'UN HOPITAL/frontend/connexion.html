<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Gestion d'hôpital</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body class="layout-body">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">H</span>
      <span>Gestion d'hôpital</span>
    </a>
    <nav class="nav-main" aria-label="Navigation principale">
      <a href="index.html">Accueil</a>
      <a href="patients.html">Patients</a>
      <a href="medecins.html">Médecins</a>
      <a href="rendez-vous.html">Rendez-vous</a>
      <a href="connexion.html" class="is-active">Connexion</a>
    </nav>
  </header>

  <main class="site-main">
    <h1 class="page-title">Connexion</h1>
    <p class="page-intro">
      Formulaire de connexion pour le personnel. Aucune authentification n'est encore branchée.
    </p>

    <form class="form-panel" action="#" method="post" aria-label="Connexion">
      <div class="form-group">
        <label for="email">Adresse e-mail ou identifiant</label>
        <input type="text" id="email" name="email" autocomplete="username" placeholder="exemple@hopital.fr">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Se connecter</button>
      </div>
    </form>
  </main>

  <footer class="site-footer">
    Projet de fin — Gestion d'un hôpital · Interface statique (HTML/CSS)
  </footer>
</body>
</html>
